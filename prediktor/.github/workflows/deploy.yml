name: Deploy to Firebase Hosting
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install app dependencies
        run: npm install
        working-directory: prediktor
      - name: Build
        run: npm run build
        working-directory: prediktor
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}
          VITE_ADMIN_PASS: ${{ secrets.VITE_ADMIN_PASS }}
          VITE_ODDS_API_KEY: ${{ secrets.VITE_ODDS_API_KEY }}
      - name: Install functions dependencies
        run: npm install
        working-directory: prediktor/functions
      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ runner.temp }}/service-account.json
      - name: Deploy functions to Firebase
        run: npx firebase-tools deploy --only functions:syncFixtures,functions:getTournamentOdds,functions:generateScoutReport,functions:scoreAllPlayers,functions:scheduledSync --force --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        working-directory: prediktor
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
      - name: Deploy hosting to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          entryPoint: prediktor
          channelId: live
